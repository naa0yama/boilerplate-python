# yaml-language-server: $schema=https://www.schemastore.org/github-action.json
name: "Dependency Audit"
description: "Run pip-audit to check for vulnerable Python dependencies"
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      with:
        install_args: uv
        # renovate: datasource=github-releases packageName=jdx/mise versioning=calver:YYYY.M.D automerge=true
        version: 2026.4.28
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Run pip-audit
      shell: bash
      # CVE-2026-3219: pip itself; no fix version available yet (pip is a tooling dep, not a runtime dep)
      run: uv run --with pip-audit pip-audit --ignore-vuln CVE-2026-3219
