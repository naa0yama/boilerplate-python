# yaml-language-server: $schema=https://www.schemastore.org/github-action.json
name: "Dependency Audit"
description: "Run pip-audit to check for vulnerable Python dependencies"
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      with:
        install_args: uv
        # renovate: datasource=github-releases packageName=jdx/mise versioning=calver:YYYY.M.D automerge=true
        version: 2026.4.18
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Run pip-audit
      shell: bash
      run: uv run --with pip-audit pip-audit
