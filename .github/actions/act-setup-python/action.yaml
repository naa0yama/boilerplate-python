# yaml-language-server: $schema=https://www.schemastore.org/github-action.json
name: "Setup Python"
description: "Install mise, cache virtualenv, and install project dependencies"
runs:
  using: "composite"
  steps:
    - name: Cache virtualenv
      uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
      with:
        path: .venv
        key: venv-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
        restore-keys: |
          venv-v1-${{ runner.os }}-${{ runner.arch }}-

    - name: Cache mise tools
      uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
      with:
        path: ~/.local/share/mise
        key: mise-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mise.toml') }}
        restore-keys: |
          mise-v1-${{ runner.os }}-${{ runner.arch }}-

    - name: Cache dprint plugins
      uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
      with:
        path: ~/.cache/dprint
        key: dprint-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('dprint.jsonc') }}
        restore-keys: |
          dprint-v1-${{ runner.os }}-${{ runner.arch }}-

    - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      with:
        cache: false
        # renovate: datasource=github-releases packageName=jdx/mise versioning=calver:YYYY.M.D automerge=true
        version: 2026.4.18
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Install dependencies
      shell: bash
      run: mise run install
