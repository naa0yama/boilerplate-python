# yaml-language-server: $schema=./schema.json
upstream:
  repo: naa0yama/boilerplate-python
  ref: main
spec:
  visibility: public
  archived: false
  features:
    issues: true
    projects: false
    wiki: false
    discussions: false
  web_commit_signoff_required: true
  merge_strategy:
    allow_merge_commit: false
    allow_squash_merge: true
    allow_rebase_merge: false
    allow_auto_merge: true
    allow_update_branch: true
    auto_delete_head_branches: true
    squash_merge_commit_title: PR_TITLE
    squash_merge_commit_message: COMMIT_MESSAGES
    merge_commit_title: PR_TITLE
    merge_commit_message: BLANK
  release_immutability: true
  label_sync: mirror
  labels:
    # Defaults
    - name: bug
      description: Something isn't working
      color: d73a4a
    - name: documentation
      description: Improvements or additions to documentation
      color: 0075ca
    - name: duplicate
      description: This issue or pull request already exists
      color: cfd3d7
    - name: enhancement
      description: New feature or request
      color: a2eeef
    - name: good first issue
      description: Good for newcomers
      color: 7057ff
    - name: help wanted
      description: Extra attention is needed
      color: "008672"
    - name: invalid
      description: This doesn't seem right
      color: e4e669
    - name: question
      description: Further information is requested
      color: d876e3
    - name: wontfix
      description: This will not be worked on
      color: ffffff
    - name: security
      description: Vulnerability disclosure or security fix
      color: ee0701

    # Custom
    - name: backport
      description: Backport from template or upstream repository
      color: 0e8a16

    # tagpr
    - name: tagpr
      description: Created by tagpr for release management
      color: "5319e7"
    - name: tagpr:minor
      description: Bump minor version (tagpr auto-label)
      color: "5319e7"
    - name: tagpr:major
      description: Bump major version (tagpr auto-label)
      color: "5319e7"
    - name: ignore-for-release
      description: Exclude from release notes
      color: ededed

    # Labeler
    - name: core
      description: Changes to core application code
      color: e11d48
    - name: renovate
      description: Dependency update by Renovate
      color: 027fa0
    - name: renovate-config
      description: Changes to Renovate configuration
      color: 027fa0
    - name: github-actions
      description: Changes to GitHub Actions workflows
      color: ffd412
    - name: develop
      description: Development branch changes
      color: bfd4f2
    - name: tests
      description: Changes to test files
      color: "257759"
    - name: gh-sync-drift
      description: Changes to gh-sync drift
      color: "257759"

    # Renovate — datasource
    - name: "datasource:"
      description: "Source: unspecified"
      color: 1e7de8
    - name: datasource:docker
      description: "Source: Docker Hub"
      color: 1e7de8
    - name: datasource:git-refs
      description: "Source: Git refs"
      color: 1e7de8
    - name: datasource:git-tags
      description: "Source: Git tags"
      color: 1e7de8
    - name: datasource:github-releases
      description: "Source: GitHub Releases"
      color: 1e7de8
    - name: datasource:github-tags
      description: "Source: GitHub Tags"
      color: 1e7de8

    # Renovate — depType
    - name: "depType:"
      description: "Dependency type: unspecified"
      color: 28a745
    - name: depType:action
      description: "Dependency type: GitHub Actions"
      color: 28a745
    - name: depType:dockerfile-automerge
      description: "Dependency type: Dockerfile (automerge)"
      color: 28a745
    - name: depType:final
      description: "Dependency type: Dockerfile final stage"
      color: 28a745
    - name: depType:mise-tool
      description: "Dependency type: mise tool"
      color: 28a745
    - name: depType:stage
      description: "Dependency type: Dockerfile stage"
      color: 28a745
    - name: depType:syntax
      description: "Dependency type: Dockerfile syntax"
      color: 28a745

    # Renovate — manager
    - name: "manager:"
      description: "Manager: unspecified"
      color: 8b5cf6
    - name: manager:dockerfile
      description: "Manager: Dockerfile"
      color: 8b5cf6
    - name: manager:github-actions
      description: "Manager: GitHub Actions"
      color: 8b5cf6
    - name: manager:mise
      description: "Manager: mise"
      color: 8b5cf6
    - name: manager:regex
      description: "Manager: regex"
      color: 8b5cf6

    # Renovate — update type
    - name: "update-"
      description: "Update type: unspecified"
      color: f97316
    - name: update-digest
      description: "Update type: digest"
      color: f97316
    - name: update-lockFileMaintenance
      description: "Update type: lockfile maintenance"
      color: f97316
    - name: update-major
      description: "Update type: major"
      color: f97316
    - name: update-minor
      description: "Update type: minor"
      color: f97316
    - name: update-patch
      description: "Update type: patch"
      color: f97316
    - name: update-pin
      description: "Update type: pin"
      color: f97316
    - name: update-pinDigest
      description: "Update type: pin digest"
      color: f97316

    # Renovate — versioning
    - name: "versioning:"
      description: "Versioning: unspecified"
      color: 14b8a6
    - name: versioning:docker
      description: "Versioning: Docker"
      color: 14b8a6
    - name: versioning:git
      description: "Versioning: Git"
      color: 14b8a6
    - name: versioning:semver
      description: "Versioning: semver"
      color: 14b8a6
    - name: versioning:semver-coerced
      description: "Versioning: semver (coerced)"
      color: 14b8a6
    - name: versioning:semver-partial
      description: "Versioning: semver (partial)"
      color: 14b8a6

  actions:
    enabled: true
    allowed_actions: selected
    selected_actions:
      github_owned_allowed: true
      patterns_allowed:
        - "devcontainers/ci@*"
        - "docker/login-action@*"
        - "jdx/mise-action@*"
        - "k1low/gh-setup@*"
        - "k1low/octocov-action@*"
        - "naa0yama/gh-sync@*"
        - "songmu/tagpr@*"
        - "zizmorcore/zizmor-action@*"
    sha_pinning_required: true
    workflow_permissions: read
    can_approve_pull_requests: true
    fork_pr_approval: all_external_contributors
  rulesets:
    - name: main
      target: branch
      enforcement: active
      conditions:
        ref_name:
          include:
            - ~DEFAULT_BRANCH
      rules:
        pull_request:
          required_approving_review_count: 0
          dismiss_stale_reviews_on_push: true
          require_code_owner_review: false
          require_last_push_approval: false
          required_review_thread_resolution: true
          allowed_merge_methods:
            - squash
        required_status_checks:
          strict_required_status_checks_policy: true
          contexts:
            - context: CI Gate
              app: github-actions
            - context: CodeQL
              app: github-advanced-security
        non_fast_forward: true
        deletion: true
        creation: false
        required_linear_history: false
        required_signatures: true
files:
  # .claude
  - path: .claude/settings.json
    strategy: replace

  # .devcontainer
  - path: .devcontainer/devcontainer.json
    strategy: replace
  - path: .devcontainer/initializeCommand.sh
    strategy: replace
  - path: .devcontainer/postStartCommand.sh
    strategy: replace

  # .githooks
  - path: .githooks/commit-msg
    strategy: replace
  - path: .githooks/pre-commit
    strategy: replace
  - path: .githooks/pre-push
    strategy: replace

  # .github/actions/act-actionlint
  - path: .github/actions/act-actionlint/action.yaml
    strategy: replace

  # .github/actions/act-audit
  - path: .github/actions/act-audit/action.yaml
    strategy: replace

  # .github/actions/act-cleanup
  - path: .github/actions/act-cleanup/action.yaml
    strategy: replace

  # .github/actions/act-codeql
  - path: .github/actions/act-codeql/action.yaml
    strategy: replace

  # .github/actions/act-docs-ci
  - path: .github/actions/act-docs-ci/action.yaml
    strategy: replace

  # .github/actions/act-prebuild-container
  - path: .github/actions/act-prebuild-container/action.yaml
    strategy: replace

  # .github/actions/act-setup-python
  - path: .github/actions/act-setup-python/action.yaml
    strategy: replace

  # .github
  - path: .github/actionlint.yaml
    strategy: replace
  - path: .github/codeql-config.yml
    strategy: replace
  - path: .github/labeler.yml
    strategy: replace
  - path: .github/labels.json
    strategy: delete
  - path: .github/project-config.json
    strategy: create_only
  - path: .github/release.yml
    strategy: replace
  - path: .github/tagpr-template.md
    strategy: replace

  # .github/gh-sync
  - path: .github/gh-sync/patches/.gitkeep
    strategy: create_only
  - path: .github/gh-sync/config.yaml
    strategy: delete
  - path: .github/gh-sync/schema.json
    strategy: delete

  # .github/rulesets
  - path: .github/rulesets/default_branch.json
    strategy: delete
  - path: .github/rulesets/tags.json
    strategy: delete

  # .github/infra
  - path: .github/infra/patches/.gitkeep
    strategy: delete
  - path: .github/infra/templates/File.yaml
    strategy: delete
  - path: .github/infra/templates/Repository.yaml
    strategy: delete
  - path: .github/infra/TEMPLATE.yaml
    strategy: delete

  # .github/workflows
  - path: .github/workflows/_orchestrator.yaml
    strategy: replace
  - path: .github/workflows/actionlint-format.txt
    strategy: replace
  - path: .github/workflows/cleanup.yaml
    strategy: replace
  - path: .github/workflows/pr-labeler.yaml
    strategy: replace
  - path: .github/workflows/python-ci.yaml
    strategy: replace
  - path: .github/workflows/actionlint.yaml
    strategy: delete
  - path: .github/workflows/audit.yaml
    strategy: delete
  - path: .github/workflows/codeql.yaml
    strategy: delete
  - path: .github/workflows/docs-ci.yaml
    strategy: delete
  - path: .github/workflows/label-sync.yaml
    strategy: delete
  - path: .github/workflows/prebuild-container.yaml
    strategy: delete
  - path: .github/workflows/tagpr.yaml
    strategy: replace

  # .mise
  - path: .mise/config.devcontainer.toml
    strategy: replace
  - path: .mise/config.tagpr.toml
    strategy: replace
  - path: .mise/overrides.toml
    strategy: create_only
  - path: .mise/tasks.toml
    strategy: replace

  # .vscode
  - path: .vscode/settings.json
    strategy: replace

  # docs/specs/components
  - path: docs/specs/components/.gitkeep
    strategy: replace

  # docs/specs/external
  - path: docs/specs/external/.gitkeep
    strategy: replace

  # tmp
  - path: tmp/.gitkeep
    strategy: replace

  # others
  - path: CLAUDE.md
    strategy: create_only
  - path: .dockerignore
    strategy: replace
  - path: .editorconfig
    strategy: replace
  - path: .gitignore
    strategy: replace
    preserve_markers: true
  - path: .octocov.yml
    strategy: replace
  - path: .tagpr
    strategy: replace
  - path: .worktreeinclude
    strategy: replace
    preserve_markers: true
  - path: Dockerfile
    strategy: replace
    preserve_markers: true
  - path: LICENSE
    strategy: replace
  - path: dprint.jsonc
    strategy: replace
  - path: mise.toml
    strategy: replace
    preserve_markers: true
  - path: pyproject.toml
    strategy: replace
    preserve_markers: true
  - path: renovate.json
    strategy: replace

  # deleted
  - path: .clinerules
    strategy: delete
  - path: .devcontainer/postCreateCommand.sh
    strategy: delete
  - path: .github/workflows/cleanup-caches-by-a-branch.yml
    strategy: delete
  - path: .github/workflows/workflow.yml
    strategy: delete
  - path: .markdownlint.yml
    strategy: delete
  - path: .pre-commit-config.yaml
    strategy: delete
  - path: .tool-versions
    strategy: delete
  - path: .devcontainer/o2-env.sh
    strategy: delete
  - path: .devcontainer/o2-import-dashboards.sh
    strategy: delete
  - path: .gitleaksignore
    strategy: delete
  - path: .vscode/extensions.json
    strategy: delete
  - path: .vscode/launch.json
    strategy: delete
  - path: .yamllint.yml
    strategy: delete
  - path: coverage.svg
    strategy: delete
  - path: mise.devcontainer.toml
    strategy: delete
  - path: mise.tagpr.toml
    strategy: delete
  - path: poetry.lock
    strategy: delete
  - path: poetry.toml
    strategy: delete
  - path: rename_project.sh
    strategy: delete
  - path: templates/continue/config.json
    strategy: delete
  - path: templates/github/rulesets_defaultbranch.json
    strategy: delete
  - path: templates/github/rulesets_tags.json
    strategy: delete
  - path: time.svg
    strategy: delete
  - path: tox.ini
    strategy: delete
