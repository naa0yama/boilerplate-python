# generated by octocov init
comment:
  deletePrevious: true
  if: is_pull_request
  hideFooterLink: true
codeToTestRatio:
  code:
    - "src/**/*.py"
    - "!**/tests/**/*.py"
    - "!**/*test*.py"
  test:
    - "tests/**/*.py"
    - "**/*test*.py"
coverage:
  acceptable: current >= 90%
  badge:
    path: coverage.svg
  if: true
  paths:
    - target/coverage.lcov
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}
push:
  if: is_default_branch
  datastores:
    - github://${GITHUB_REPOSITORY}@badges
  message: "Update coverage badges [skip ci]"
report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}
summary:
  if: true
  hideFooterLink: true
testExecutionTime:
  badge:
    path: time.svg
  if: true
